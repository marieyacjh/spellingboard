<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spelling Bee - Classroom Edition</title>
    <style>
        :root {
            --bee-yellow: #FFD700;
            --bee-black: #222;
            --bee-white: #FFFFFF;
            --bee-soft-gray: #f4f4f4;
            /* Using Comic Sans or similar rounded fonts for children */
            --bee-font: "Comic Sans MS", "Comic Sans", "Chalkboard SE", "Comic Neue", cursive;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body {
            margin: 0;
            font-family: var(--bee-font);
            background-color: var(--bee-white);
            color: var(--bee-black);
            overflow: hidden;
            height: 100vh;
        }

        /* Typography */
        h1, h2 { text-transform: uppercase; letter-spacing: 2px; }
        .large-text { font-size: 2.5rem; font-weight: bold; }

        /* UI Components */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            padding: 20px;
            position: absolute;
            top: 0;
            left: 0;
        }

        .screen.active { display: flex; }

        .bee-btn {
            font-family: var(--bee-font);
            background-color: var(--bee-yellow);
            color: var(--bee-black);
            border: 4px solid var(--bee-black);
            border-radius: 15px;
            padding: 15px 30px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 6px 0 var(--bee-black);
        }

        .bee-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 var(--bee-black);
        }

        .back-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 10px 20px;
            font-size: 1rem;
            z-index: 100;
        }

        /* Animations */
        @keyframes flap {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .bee-icon {
            font-size: 5rem;
            animation: flap 2s infinite ease-in-out;
            margin-bottom: 20px;
        }

        /* Grid / Layouts */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 800px;
        }

        /* Duel Mode Split */
        .duel-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            border-right: 4px dashed var(--bee-black);
            position: relative;
        }

        .side:last-child { border-right: none; }

        .team-name-input {
            font-family: var(--bee-font);
            border: none;
            background: var(--bee-soft-gray);
            font-size: 2rem;
            text-align: center;
            width: 80%;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        /* Keyboards */
        .keyboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
            width: 100%;
            max-width: 550px;
            margin-top: 10px;
        }

        .key {
            background: var(--bee-yellow);
            border: 2px solid var(--bee-black);
            border-radius: 5px;
            width: 45px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.4rem;
            cursor: pointer;
            user-select: none;
        }

        .key.wide { width: 90px; }

        /* Game Elements */
        .word-display {
            font-size: 3.5rem;
            letter-spacing: 12px;
            min-height: 4.5rem;
            border-bottom: 6px solid var(--bee-black);
            margin: 20px 0;
            padding: 0 20px;
            text-align: center;
        }

        .drop-zone {
            display: flex;
            gap: 10px;
            min-height: 90px;
            padding: 15px;
            background: var(--bee-soft-gray);
            border-radius: 15px;
            width: 90%;
            justify-content: center;
            margin-bottom: 20px;
            border: 2px dashed #999;
        }

        .tile {
            background: var(--bee-yellow);
            border: 3px solid var(--bee-black);
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            user-select: none;
            box-shadow: 0 4px 0 #000;
        }

        /* Student Picker */
        .picker-area {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: white;
            border: 3px solid black;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
        }

        #class-size {
            font-family: var(--bee-font);
            font-weight: bold;
        }

        .history-list {
            width: 100%;
            max-width: 400px;
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            background: var(--bee-soft-gray);
            margin: 5px;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="menu-screen" class="screen active">
        <div class="bee-icon">🐝</div>
        <h1>Spelling Bee</h1>
        <div class="menu-grid">
            <button class="bee-btn" onclick="showModeSelection('practice')">Practice</button>
            <button class="bee-btn" onclick="showModeSelection('duel')">Team Duel</button>
            <button class="bee-btn" onclick="showScreen('edit-screen')">Edit Words</button>
            <button class="bee-btn" onclick="showScreen('load-screen')">Game Code</button>
            <button class="bee-btn" onclick="renderHistory()">History</button>
        </div>
    </div>

    <div id="mode-screen" class="screen">
        <button class="bee-btn back-btn" onclick="showScreen('menu-screen')">Back</button>
        <h2 id="mode-title">Select Style</h2>
        <button class="bee-btn" onclick="startGame('unscramble')">Unscramble Tiles</button>
        <button class="bee-btn" onclick="startGame('spellit')">Keyboard Spelling</button>
    </div>

    <div id="game-screen" class="screen">
        <button class="bee-btn back-btn" onclick="showScreen('menu-screen')">Back</button>
        <div id="practice-area" style="text-align: center; width: 100%;">
            <div class="large-text" id="score-display">Score: 0</div>
            <button class="bee-btn" onclick="speakWord()">🔊 Listen</button>
            <div id="game-container" style="display:flex; flex-direction:column; align-items:center;">
                </div>
        </div>
    </div>

    <div id="duel-screen" class="screen" style="padding: 0;">
        <button class="bee-btn back-btn" onclick="showScreen('menu-screen')">Back</button>
        <div class="duel-container">
            <div class="side" id="side-left">
                <input type="text" class="team-name-input" value="Team A">
                <div class="large-text">Score: <span id="score-L">0</span></div>
                <button class="bee-btn" onclick="speakWord()">🔊 Listen</button>
                <div id="game-L" class="duel-play-area"></div>
                <div id="kb-L-container"></div>
            </div>
            <div class="side" id="side-right">
                <input type="text" class="team-name-input" value="Team B">
                <div class="large-text">Score: <span id="score-R">0</span></div>
                <button class="bee-btn" onclick="speakWord()">🔊 Listen</button>
                <div id="game-R" class="duel-play-area"></div>
                <div id="kb-R-container"></div>
            </div>
        </div>
        <div class="picker-area">
            Size: <input type="number" id="class-size" value="20" style="width: 50px;">
            <button onclick="pickStudent()">Pick Student</button>
            <div id="picked-num" style="font-size: 1.5rem;">#?</div>
        </div>
    </div>

    <div id="edit-screen" class="screen">
        <button class="bee-btn back-btn" onclick="showScreen('menu-screen')">Back</button>
        <h2>Edit Word List</h2>
        <textarea id="word-input" style="width: 80%; height: 200px; font-size: 1.5rem; font-family: var(--bee-font);" placeholder="Enter words separated by commas..."></textarea>
        <button class="bee-btn" onclick="saveWordList()">Save & Get Code</button>
    </div>

    <div id="load-screen" class="screen">
        <button class="bee-btn back-btn" onclick="showScreen('menu-screen')">Back</button>
        <h2>Enter 6-Digit Code</h2>
        <input type="text" id="join-code" style="font-size: 3.5rem; text-align: center; width: 350px; font-family: var(--bee-font);" maxlength="6">
        <button class="bee-btn" onclick="loadByCode()">Load List</button>
    </div>

    <div id="history-screen" class="screen">
        <button class="bee-btn back-btn" onclick="showScreen('menu-screen')">Back</button>
        <h2>Recent Lessons</h2>
        <div id="history-container" class="history-list"></div>
    </div>

    <script>
        /* --- State Management --- */
        let currentWords = ["Alphabet", "Beehive", "Challenge", "Knowledge", "Success", "Classroom", "Student", "Teacher", "English", "Victory"];
        let currentGameMode = 'practice';
        let currentStyle = 'unscramble';
        let currentWordIndex = 0;
        let scores = { practice: 0, L: 0, R: 0 };
        let history = JSON.parse(localStorage.getItem('bee_history') || '[]');

        /* --- Audio Setup --- */
        const synth = window.speechSynthesis;
        const sfxCorrect = new Audio('https://actions.google.com/sounds/v1/cartoon/clink_tap.ogg');
        const sfxWrong = new Audio('https://actions.google.com/sounds/v1/cartoon/boing.ogg');

        function speakWord() {
            synth.cancel(); // Stop current speech
            const utterance = new SpeechSynthesisUtterance(currentWords[currentWordIndex]);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            synth.speak(utterance);
        }

        /* --- Navigation --- */
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function showModeSelection(mode) {
            currentGameMode = mode;
            document.getElementById('mode-title').innerText = mode === 'practice' ? 'Solo Practice' : 'Team Duel';
            showScreen('mode-screen');
        }

        /* --- Word Management --- */
        function saveWordList() {
            const input = document.getElementById('word-input').value;
            const words = input.split(',').map(w => w.trim()).filter(w => w.length > 0);
            if (words.length === 0) return alert("Please type some words!");
            
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            localStorage.setItem('bee_code_' + code, JSON.stringify(words));
            addToHistory(code);
            currentWords = words;
            alert("Success! Your Lesson Code is: " + code);
            showScreen('menu-screen');
        }

        function loadByCode() {
            const code = document.getElementById('join-code').value;
            const data = localStorage.getItem('bee_code_' + code);
            if (data) {
                currentWords = JSON.parse(data);
                addToHistory(code);
                alert("Word list loaded!");
                showScreen('menu-screen');
            } else {
                alert("Code not found.");
            }
        }

        function addToHistory(code) {
            history = history.filter(item => item !== code);
            history.unshift(code);
            if (history.length > 10) history.pop();
            localStorage.setItem('bee_history', JSON.stringify(history));
        }

        function renderHistory() {
            const container = document.getElementById('history-container');
            container.innerHTML = '';
            history.forEach(code => {
                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `<span>Code: ${code}</span> <button class="bee-btn" style="font-size:1rem; padding: 5px 15px;" onclick="quickLoad('${code}')">Load</button>`;
                container.appendChild(item);
            });
            showScreen('history-screen');
        }

        function quickLoad(code) {
            document.getElementById('join-code').value = code;
            loadByCode();
        }

        /* --- Gameplay Core --- */
        function startGame(style) {
            currentStyle = style;
            currentWordIndex = 0;
            scores = { practice: 0, L: 0, R: 0 };
            
            if (currentGameMode === 'practice') {
                document.getElementById('score-display').innerText = "Score: 0";
                showScreen('game-screen');
                loadNextWord();
            } else {
                document.getElementById('score-L').innerText = "0";
                document.getElementById('score-R').innerText = "0";
                showScreen('duel-screen');
                loadNextWordDuel();
            }
        }

        function loadNextWord() {
            if (currentWordIndex >= currentWords.length) {
                alert("Great job! You finished the list!");
                showScreen('menu-screen');
                return;
            }
            const container = document.getElementById('game-container');
            container.innerHTML = '';
            const word = currentWords[currentWordIndex].toUpperCase();

            if (currentStyle === 'unscramble') {
                setupUnscramble(container, word, 'solo');
            } else {
                setupSpellIt(container, word, 'solo');
            }
            speakWord();
        }

        function loadNextWordDuel() {
            if (currentWordIndex >= currentWords.length) {
                const winner = scores.L > scores.R ? "Team Left" : (scores.R > scores.L ? "Team Right" : "It's a Tie!");
                alert(`Game Over! ${winner}`);
                showScreen('menu-screen');
                return;
            }
            const areaL = document.getElementById('game-L');
            const areaR = document.getElementById('game-R');
            areaL.innerHTML = ''; areaR.innerHTML = '';
            
            const word = currentWords[currentWordIndex].toUpperCase();
            
            if (currentStyle === 'unscramble') {
                setupUnscramble(areaL, word, 'L');
                setupUnscramble(areaR, word, 'R');
            } else {
                setupSpellIt(areaL, word, 'L', 'kb-L-container');
                setupSpellIt(areaR, word, 'R', 'kb-R-container');
            }
            speakWord();
        }

        /* --- UI Building Helpers --- */
        function setupUnscramble(container, word, side) {
            const dropZone = document.createElement('div');
            dropZone.className = 'drop-zone';
            dropZone.id = 'drop-' + side;
            
            const tileArea = document.createElement('div');
            tileArea.className = 'drop-zone';

            const letters = word.split('').sort(() => Math.random() - 0.5);
            letters.forEach((l, i) => {
                const tile = document.createElement('div');
                tile.className = 'tile';
                tile.innerText = l;
                tile.onclick = () => {
                    if (tile.parentElement === tileArea) dropZone.appendChild(tile);
                    else tileArea.appendChild(tile);
                    checkUnscramble(word, dropZone, side);
                };
                tileArea.appendChild(tile);
            });
            container.appendChild(dropZone);
            container.appendChild(tileArea);
        }

        function checkUnscramble(original, zone, side) {
            const guess = Array.from(zone.children).map(t => t.innerText).join('');
            if (guess === original) handleCorrect(side);
        }

        function setupSpellIt(container, word, side, kbContainerId = null) {
            const display = document.createElement('div');
            display.className = 'word-display';
            display.id = 'display-' + side;
            container.appendChild(display);

            const kbTarget = kbContainerId ? document.getElementById(kbContainerId) : container;
            createKeyboard(kbTarget, side, word);
        }

        function createKeyboard(container, side, targetWord) {
            container.innerHTML = '';
            const rows = ["QWERTYUIOP", "ASDFGHJKL", "ZXCVBNM"];
            rows.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'keyboard';
                row.split('').forEach(char => {
                    const key = document.createElement('div');
                    key.className = 'key';
                    key.innerText = char;
                    key.onclick = () => {
                        const display = document.getElementById('display-' + side);
                        display.innerText += char;
                        if (display.innerText === targetWord) {
                            handleCorrect(side);
                        } else if (!targetWord.startsWith(display.innerText)) {
                            sfxWrong.play();
                            display.innerText = '';
                        }
                    };
                    rowDiv.appendChild(key);
                });
                container.appendChild(rowDiv);
            });
            
            const del = document.createElement('div');
            del.className = 'key wide';
            del.innerText = 'DEL';
            del.onclick = () => {
                const d = document.getElementById('display-' + side);
                d.innerText = d.innerText.slice(0, -1);
            };
            container.appendChild(del);
        }

        function handleCorrect(side) {
            sfxCorrect.play();
            if (side === 'solo') {
                scores.practice++;
                document.getElementById('score-display').innerText = `Score: ${scores.practice}`;
            } else {
                scores[side]++;
                document.getElementById('score-' + side).innerText = scores[side];
            }
            
            currentWordIndex++;
            setTimeout(() => {
                if (currentGameMode === 'practice') loadNextWord();
                else loadNextWordDuel();
            }, 600);
        }

        function pickStudent() {
            const max = document.getElementById('class-size').value;
            const num = Math.floor(Math.random() * max) + 1;
            document.getElementById('picked-num').innerText = "#" + num;
        }

        // Setup default view
        document.getElementById('word-input').value = currentWords.join(', ');
    </script>
</body>
</html>
