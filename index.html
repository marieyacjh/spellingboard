<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spelling Bee: Classroom Master</title>
    <style>
        /* VISUAL DESIGN & THEME */
        :root {
            --honey-yellow: #ffecb3;
            --bee-yellow: #ffcc00;
            --soft-white: #ffffff;
            --text-dark: #333333;
            --border-color: #b89500;
        }

        body {
            font-family: "Comic Sans MS", "Comic Sans", cursive;
            background-color: var(--soft-white);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        .screen {
            display: none;
            min-height: 100vh;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .active { display: flex; }

        h1 { font-size: 3.5rem; margin-bottom: 5px; text-transform: uppercase; }

        /* BUTTONS */
        .btn {
            background-color: var(--bee-yellow);
            border: 3px solid var(--border-color);
            border-radius: 25px;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            margin: 10px;
            box-shadow: 0 5px 0 var(--border-color);
            transition: all 0.1s;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 var(--border-color);
        }

        .btn-small { padding: 8px 15px; font-size: 1rem; border-radius: 15px; }

        /* KEYBOARD - 3 ROW QWERTY */
        .keyboard {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin-top: 15px;
        }
        .kb-row {
            display: flex;
            justify-content: center;
            margin-bottom: 5px;
            width: 100%;
        }
        .key {
            width: 45px;
            height: 55px;
            margin: 3px;
            background: var(--honey-yellow);
            border: 2px solid var(--bee-yellow);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            user-select: none;
        }

        /* DUEL LAYOUT */
        .duel-container {
            display: flex;
            width: 100vw;
            height: 85vh;
        }
        .team-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 4px dashed var(--bee-yellow);
            padding: 10px;
            background: #fffdf5;
        }

        /* TILES */
        .tiles-container, .target-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            min-height: 65px;
            margin: 10px 0;
            padding: 10px;
            background: #ffffff;
            border: 2px solid #eee;
            border-radius: 15px;
            width: 90%;
            justify-content: center;
        }
        .letter-tile {
            min-width: 50px;
            height: 50px;
            background: var(--bee-yellow);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: bold;
            cursor: pointer;
            padding: 0 5px;
        }

        /* STUDENT PICKER */
        .picker-box {
            background: var(--honey-yellow);
            padding: 10px;
            border-radius: 15px;
            margin-bottom: 10px;
            text-align: center;
            border: 2px solid var(--bee-yellow);
        }

        input, textarea { 
            font-family: inherit; 
            padding: 12px; 
            border-radius: 10px; 
            border: 3px solid var(--bee-yellow); 
            font-size: 1.1rem;
        }

        .back-btn { position: absolute; top: 10px; left: 10px; z-index: 100; }
        .display-area { font-size: 2.2rem; font-weight: bold; height: 50px; margin: 15px; border-bottom: 4px solid var(--bee-yellow); min-width: 200px; }
        .score-val { font-size: 2.5rem; color: #d48806; }
    </style>
</head>
<body>

    <button class="btn btn-small back-btn" onclick="showScreen('menu-screen')">BACK TO MENU</button>

    <div id="menu-screen" class="screen active">
        <div style="height: 50px;"></div>
        <h1>SPELLING BEE</h1>
        <p>CLASSROOM MASTER</p>
        <button class="btn" onclick="openModeSelect('practice')">SPELLING PRACTICE</button>
        <button class="btn" onclick="openModeSelect('duel')">TEAM DUEL</button>
        <button class="btn" onclick="showScreen('edit-screen')">EDIT WORDS</button>
        <button class="btn" onclick="showScreen('code-screen')">GAME CODE</button>
        <button class="btn" onclick="showHistory()">CODE HISTORY</button>
    </div>

    <div id="mode-screen" class="screen">
        <h2 id="mode-title">CHOOSE STYLE</h2>
        
        <div id="picker-container" style="display: flex; gap: 20px; margin-bottom: 20px;">
            <div class="picker-box" id="picker-p">
                <input type="number" class="class-size" placeholder="CLASS SIZE" value="20" style="width: 80px;">
                <button class="btn btn-small" onclick="pickStudent('p')">PICK STUDENT</button>
                <div class="picked-num" id="num-p" style="font-weight: bold; font-size: 1.5rem;">-</div>
            </div>
        </div>

        <div style="display: flex;">
            <button class="btn" onclick="startGame('unscramble')">UNSCRAMBLE</button>
            <button class="btn" onclick="startGame('spell')">SPELL IT</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="score-val">SCORE: <span id="p-score">0</span></div>
        <button class="btn" onclick="speakWord()">LISTEN</button>
        <div id="p-play" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
    </div>

    <div id="duel-screen" class="screen" style="padding: 0;">
        <div class="duel-container">
            <div class="team-side" id="l-side">
                <input type="text" value="TEAM A" class="team-name" style="text-align:center; font-weight:bold; width: 80%;">
                <div class="score-val"><span id="l-score">0</span></div>
                <div id="l-play" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
            </div>
            <div class="team-side" id="r-side">
                <input type="text" value="TEAM B" class="team-name" style="text-align:center; font-weight:bold; width: 80%;">
                <div class="score-val"><span id="r-score">0</span></div>
                <div id="r-play" style="width: 100%; display: flex; flex-direction: column; align-items: center;"></div>
            </div>
        </div>
        <button class="btn" style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);" onclick="speakWord()">LISTEN</button>
    </div>

    <div id="edit-screen" class="screen">
        <h2>EDIT WORD LIST</h2>
        <p>One word per line. Case sensitivity is preserved!</p>
        <textarea id="word-input" rows="10" cols="40"></textarea>
        <button class="btn" onclick="saveWords()">SAVE & GET CODE</button>
    </div>

    <div id="code-screen" class="screen">
        <h2>ENTER GAME CODE</h2>
        <input type="text" id="game-code-input" maxlength="6" style="font-size: 2.5rem; text-align: center;">
        <button class="btn" onclick="loadByCode()">LOAD WORDS</button>
    </div>

    <div id="history-screen" class="screen">
        <h2>CODE HISTORY</h2>
        <div id="history-list"></div>
    </div>

    <script>
        // CONFIG & DATA
        let currentWords = ["Alphabet", "Beehive", "Challenge", "Knowledge", "Classroom"];
        let gameMode = 'practice'; 
        let gameStyle = 'spell';
        let wordIndex = 0;
        let scores = { p: 0, l: 0, r: 0 };
        const rows = [
            "QWERTYUIOP".split(""),
            "ASDFGHJKL".split(""),
            "ZXCVBNM".split("")
        ];

        // NAVIGATION
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function openModeSelect(mode) {
            gameMode = mode;
            const container = document.getElementById('picker-container');
            container.innerHTML = '';
            
            if (mode === 'practice') {
                container.innerHTML = createPickerHTML('p');
            } else {
                container.innerHTML = createPickerHTML('l') + createPickerHTML('r');
            }
            
            document.getElementById('mode-title').innerText = mode.toUpperCase() + " MODE";
            showScreen('mode-screen');
        }

        function createPickerHTML(id) {
            return `
            <div class="picker-box">
                <div style="font-weight:bold; margin-bottom:5px;">${id === 'p' ? 'RANDOM' : 'TEAM ' + id.toUpperCase()}</div>
                <input type="number" id="size-${id}" value="20" style="width: 60px;">
                <button class="btn btn-small" onclick="pickStudent('${id}')">PICK</button>
                <div id="num-${id}" style="font-size: 1.5rem; font-weight: bold;">-</div>
            </div>`;
        }

        function pickStudent(id) {
            const max = document.getElementById('size-' + id).value;
            document.getElementById('num-' + id).innerText = Math.floor(Math.random() * max) + 1;
        }

        // WORD LOGIC
        function speakWord() {
            const utterance = new SpeechSynthesisUtterance(currentWords[wordIndex]);
            utterance.lang = 'en-US';
            window.speechSynthesis.speak(utterance);
        }

        function startGame(style) {
            gameStyle = style;
            wordIndex = 0;
            scores = { p: 0, l: 0, r: 0 };
            updateScoreDisplay();
            
            if (gameMode === 'practice') {
                showScreen('game-screen');
                renderRound('p-play', 'p');
            } else {
                showScreen('duel-screen');
                renderRound('l-play', 'l');
                renderRound('r-play', 'r');
            }
        }

        function renderRound(containerId, side) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            const targetWord = currentWords[wordIndex];

            if (gameStyle === 'spell') {
                const display = document.createElement('div');
                display.id = side + "-display";
                display.className = "display-area";
                container.appendChild(display);
                renderKeyboard(container, side, targetWord);
            } else {
                renderUnscramble(container, side, targetWord);
            }
        }

        function renderKeyboard(container, side, targetWord) {
            const kbContainer = document.createElement('div');
            kbContainer.className = "keyboard";

            rows.forEach(rowLetters => {
                const rowDiv = document.createElement('div');
                rowDiv.className = "kb-row";
                rowLetters.forEach(char => {
                    const key = document.createElement('div');
                    key.className = "key";
                    // Match casing logic: If target word is lowercase, show lowercase keys
                    const displayChar = isAllLower(targetWord) ? char.toLowerCase() : char;
                    key.innerText = displayChar;
                    key.onclick = () => handleKey(side, displayChar);
                    rowDiv.appendChild(key);
                });
                kbContainer.appendChild(rowDiv);
            });

            // Add Backspace Row
            const lastRow = document.createElement('div');
            lastRow.className = "kb-row";
            const del = document.createElement('div');
            del.className = "key"; del.style.width = "100px"; del.innerText = "DELETE";
            del.onclick = () => {
                const d = document.getElementById(side + "-display");
                d.innerText = d.innerText.slice(0, -1);
            };
            lastRow.appendChild(del);
            kbContainer.appendChild(lastRow);
            
            container.appendChild(kbContainer);
        }

        function handleKey(side, char) {
            const display = document.getElementById(side + "-display");
            const target = currentWords[wordIndex];
            
            // Auto-case logic based on the user's word list input
            let charToType = char;
            const currentLen = display.innerText.length;
            
            // If the original word's character at this position is lowercase/uppercase, force it
            if (target[currentLen]) {
                const targetChar = target[currentLen];
                if (targetChar === targetChar.toLowerCase() && targetChar !== targetChar.toUpperCase()) {
                    charToType = char.toLowerCase();
                } else {
                    charToType = char.toUpperCase();
                }
            }

            display.innerText += charToType;
            checkWin(side);
        }

        function renderUnscramble(container, side, targetWord) {
            const targetArea = document.createElement('div');
            targetArea.className = "target-container";
            targetArea.id = side + "-target";
            
            const poolArea = document.createElement('div');
            poolArea.className = "tiles-container";
            poolArea.id = side + "-pool";

            // Create tiles based on the exact characters in the word
            const chars = targetWord.split('').sort(() => Math.random() - 0.5);
            chars.forEach(c => {
                const tile = document.createElement('div');
                tile.className = "letter-tile";
                tile.innerText = c;
                tile.onclick = () => {
                    if (tile.parentElement === poolArea) targetArea.appendChild(tile);
                    else poolArea.appendChild(tile);
                    checkWin(side);
                };
                poolArea.appendChild(tile);
            });

            container.appendChild(targetArea);
            container.appendChild(poolArea);
        }

        function checkWin(side) {
            let attempt = "";
            const target = currentWords[wordIndex];

            if (gameStyle === 'spell') {
                attempt = document.getElementById(side + "-display").innerText;
            } else {
                attempt = Array.from(document.getElementById(side + "-target").children).map(t => t.innerText).join("");
            }

            if (attempt === target) {
                scores[side]++;
                updateScoreDisplay();
                wordIndex++;
                if (wordIndex >= currentWords.length) {
                    alert("ROUND FINISHED!");
                    showScreen('menu-screen');
                } else {
                    if (gameMode === 'practice') renderRound('p-play', 'p');
                    else { renderRound('l-play', 'l'); renderRound('r-play', 'r'); }
                }
            }
        }

        // HELPERS
        function isAllLower(str) { return str === str.toLowerCase(); }
        
        function updateScoreDisplay() {
            ['p','l','r'].forEach(s => {
                const el = document.getElementById(s + '-score');
                if (el) el.innerText = scores[s];
            });
        }

        function saveWords() {
            const input = document.getElementById('word-input').value;
            const list = input.split('\n').map(s => s.trim()).filter(s => s !== "");
            if (list.length === 0) return;
            
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            currentWords = list;
            localStorage.setItem('words_' + code, JSON.stringify(list));
            
            let history = JSON.parse(localStorage.getItem('bee_history') || "[]");
            history.unshift({code, date: new Date().toLocaleDateString()});
            localStorage.setItem('bee_history', JSON.stringify(history.slice(0, 10)));
            
            alert("SAVED! CODE: " + code);
            showScreen('menu-screen');
        }

        function loadByCode() {
            const code = document.getElementById('game-code-input').value;
            const data = localStorage.getItem('words_' + code);
            if (data) {
                currentWords = JSON.parse(data);
                alert("LOADED " + currentWords.length + " WORDS");
                showScreen('menu-screen');
            } else alert("CODE NOT FOUND");
        }

        function showHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            const history = JSON.parse(localStorage.getItem('bee_history') || "[]");
            history.forEach(h => {
                const b = document.createElement('button');
                b.className = "btn";
                b.innerText = h.code + " (" + h.date + ")";
                b.onclick = () => {
                    currentWords = JSON.parse(localStorage.getItem('words_' + h.code));
                    showScreen('menu-screen');
                };
                list.appendChild(b);
            });
            showScreen('history-screen');
        }

        document.getElementById('word-input').value = currentWords.join('\n');
    </script>
</body>
</html>
