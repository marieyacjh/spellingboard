<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spelling Bee: Classroom Master</title>
    <style>
        :root {
            --bee-yellow: #FFD700;
            --bee-black: #333;
            --squirrel-color: #D2691E;
            --bear-color: #2F4F4F;
            --white: #FFFFFF;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: manipulation; }
        
        body { margin: 0; padding: 0; background-color: var(--white); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* Utility Classes */
        .hidden { display: none !important; }
        .large-btn { padding: 15px 30px; font-size: 24px; cursor: pointer; border-radius: 15px; border: none; transition: transform 0.2s; font-weight: bold; }
        .large-btn:active { transform: scale(0.95); }

        /* Background Bee Decoration */
        .bee-bg { position: fixed; width: 60px; height: 60px; z-index: -1; animation: fly 10s infinite linear; pointer-events: none; }
        @keyframes fly {
            0% { transform: translate(-100px, 100px) rotate(0deg); }
            50% { transform: translate(110vw, 40vh) rotate(10deg); }
            100% { transform: translate(-100px, 80vh) rotate(0deg); }
        }

        /* Menu System */
        #main-menu { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        h1 { font-size: 60px; color: var(--bee-black); margin-bottom: 30px; text-shadow: 2px 2px var(--bee-yellow); }

        /* Word List Editor */
        #editor-container { padding: 20px; text-align: center; overflow-y: auto; height: 100%; }
        #word-input-area { width: 80%; max-width: 600px; height: 200px; font-size: 20px; border: 3px solid var(--bee-yellow); border-radius: 10px; padding: 10px; }

        /* Game Screens */
        .game-screen { flex: 1; display: flex; flex-direction: column; }
        .header { height: 60px; background: var(--bee-yellow); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; font-weight: bold; }

        /* Duel Mode Layout */
        #duel-container { display: flex; height: 100%; width: 100%; }
        .team-zone { flex: 1; display: flex; flex-direction: column; align-items: center; border: 4px solid; position: relative; padding: 10px; }
        .squirrel-zone { border-color: var(--squirrel-color); background-color: #fff9f5; }
        .bear-zone { border-color: var(--bear-color); background-color: #f5f9f9; }

        /* Logic Fix - Drag and Drop */
        .slots-container, .letters-pool { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 20px 0; min-height: 70px; width: 90%; }
        .slot, .letter-tile { 
            width: 60px; height: 60px; border: 2px dashed #ccc; border-radius: 8px; 
            display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold;
            background: white; cursor: grab;
        }
        .letter-tile { border-style: solid; border-color: var(--bee-black); background: var(--bee-yellow); }
        .slot.occupied { border-style: solid; border-color: var(--bee-black); background: #eee; }

        /* On-Screen Keyboard */
        .keyboard { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; width: 95%; max-width: 500px; margin-top: auto; padding-bottom: 10px; }
        .key { padding: 12px 5px; background: #444; color: white; border-radius: 5px; text-align: center; font-size: 18px; cursor: pointer; border: none; }
        .key-wide { grid-column: span 1.5; }

        /* Icons & Stats */
        .team-header { font-size: 28px; font-weight: bold; display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .v-patch { background: white; color: black; padding: 2px 8px; clip-path: polygon(0 0, 100% 0, 50% 100%); font-size: 10px; }

        /* Code History */
        #history-list { list-style: none; padding: 0; width: 300px; }
        .history-item { 
            background: #eee; margin: 5px; padding: 15px; border-radius: 10px; 
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>

    <div class="bee-bg">🐝</div>

    <div id="main-menu">
        <h1>🐝 Spelling Bee</h1>
        <button class="large-btn" style="background: var(--bee-yellow)" onclick="showScreen('mode-selection'); gameMode='solo'">Practice (Solo)</button>
        <button class="large-btn" style="background: var(--bee-yellow)" onclick="showScreen('mode-selection'); gameMode='duel'">Duel (Team)</button>
        <button class="large-btn" style="background: #add8e6" onclick="showEditor()">Edit Words</button>
        <button class="large-btn" style="background: #98fb98" onclick="showScreen('game-code-screen')">Enter Game Code</button>
        <button class="large-btn" style="background: #dda0dd" onclick="showHistory()">Code History</button>
        
        <div style="margin-top:20px; border: 2px solid #ccc; padding: 10px; border-radius: 10px;">
            <strong>Student Picker:</strong>
            <input type="number" id="class-size" placeholder="Size" style="width:60px; font-size:20px">
            <button class="large-btn" style="padding: 5px 15px; font-size: 18px" onclick="pickStudent()">Pick!</button>
            <span id="picked-student" style="font-size: 24px; margin-left:10px; font-weight:bold; color:red"></span>
        </div>
    </div>

    <div id="mode-selection" class="hidden">
        <div class="header"><button onclick="showScreen('main-menu')">Back</button> <span>Select Style</span></div>
        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:80%; gap:20px">
            <button class="large-btn" onclick="startGame('unscramble')">🧩 Unscramble (Logic Fix)</button>
            <button class="large-btn" onclick="startGame('spellit')">⌨️ Spell It (Typing)</button>
        </div>
    </div>

    <div id="editor-container" class="hidden">
        <h2>List Editor</h2>
        <textarea id="word-input-area" placeholder="Enter words separated by commas or enters..."></textarea>
        <br><br>
        <button class="large-btn" style="background: #98fb98" onclick="saveWordList()">Save & Generate Code</button>
        <button class="large-btn" onclick="showScreen('main-menu')">Cancel</button>
    </div>

    <div id="game-code-screen" class="hidden" style="text-align:center; padding-top:100px">
        <h2>Enter 6-Digit Code</h2>
        <input type="text" id="code-input" maxlength="6" style="font-size:40px; text-align:center; width:200px"><br><br>
        <button class="large-btn" onclick="loadByCode()">Load List</button>
        <button class="large-btn" onclick="showScreen('main-menu')">Back</button>
    </div>

    <div id="history-screen" class="hidden" style="text-align:center; padding-top:50px">
        <h2>Recent Game Codes</h2>
        <div style="display:flex; flex-direction:column; align-items:center">
            <div id="history-list"></div>
        </div>
        <br>
        <button class="large-btn" onclick="showScreen('main-menu')">Back</button>
    </div>

    <div id="game-play" class="hidden game-screen">
        <div class="header">
            <button onclick="showScreen('main-menu')">Back to Menu</button>
            <span id="game-title-display">Spelling Bee</span>
            <span id="current-word-index">Word: 0/0</span>
        </div>
        
        <div id="duel-container">
            <div id="team-left" class="team-zone squirrel-zone">
                <div class="team-header">🐿️ Mimi Squirrel <span id="score-left">0</span></div>
                <button class="large-btn" style="background:var(--bee-yellow)" onclick="speakWord()">🔊 Listen</button>
                <div id="play-area-left" class="play-content"></div>
                <div id="kb-left" class="keyboard"></div>
            </div>

            <div id="team-right" class="team-zone bear-zone">
                <div class="team-header">🐻 Hero Bear <span class="v-patch">V</span> <span id="score-right">0</span></div>
                <button class="large-btn" style="background:var(--bee-yellow)" onclick="speakWord()">🔊 Listen</button>
                <div id="play-area-right" class="play-content"></div>
                <div id="kb-right" class="keyboard"></div>
            </div>
        </div>
    </div>

    <script>
        // --- DATA & STATE ---
        let currentWords = ["Alphabet", "Beehive", "Challenge", "Knowledge", "Classroom", "Student", "Teacher", "English", "School", "Learning"];
        let gameMode = 'solo'; // 'solo' or 'duel'
        let playStyle = 'spellit'; // 'unscramble' or 'spellit'
        let currentIndex = 0;
        let scores = { left: 0, right: 0 };
        let draggedElement = null;

        const synth = window.speechSynthesis;
        const soundCorrect = new Audio('https://actions.google.com/sounds/v1/cartoon/clime.ogg');
        const soundWrong = new Audio('https://actions.google.com/sounds/v1/cartoon/buzz.ogg');

        // --- NAVIGATION ---
        function showScreen(screenId) {
            document.querySelectorAll('body > div').forEach(div => {
                if(!div.classList.contains('bee-bg')) div.classList.add('hidden');
            });
            document.getElementById(screenId).classList.remove('hidden');
        }

        function showEditor() {
            showScreen('editor-container');
            document.getElementById('word-input-area').value = currentWords.join(', ');
        }

        // --- WORD LIST LOGIC ---
        function saveWordList() {
            const input = document.getElementById('word-input-area').value;
            const newList = input.split(/[,\n]/).map(w => w.trim()).filter(w => w.length > 0).slice(0, 50);
            if(newList.length === 0) return alert("Please enter some words!");
            
            currentWords = newList;
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            localStorage.setItem('list_' + code, JSON.stringify(currentWords));
            addToHistory(code);
            alert("Game Saved! Your code is: " + code);
            showScreen('main-menu');
        }

        function loadByCode() {
            const code = document.getElementById('code-input').value;
            const saved = localStorage.getItem('list_' + code);
            if(saved) {
                currentWords = JSON.parse(saved);
                addToHistory(code);
                alert("List Loaded!");
                showScreen('main-menu');
            } else {
                alert("Code not found.");
            }
        }

        function addToHistory(code) {
            let history = JSON.parse(localStorage.getItem('bee_history') || '[]');
            history = history.filter(c => c !== code);
            history.unshift(code);
            localStorage.setItem('bee_history', JSON.stringify(history.slice(0, 10)));
        }

        function showHistory() {
            const history = JSON.parse(localStorage.getItem('bee_history') || '[]');
            const list = document.getElementById('history-list');
            list.innerHTML = history.length ? '' : 'No history found.';
            history.forEach(code => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `<span>Code: <strong>${code}</strong></span> <button onclick="quickLoad('${code}')">Load</button>`;
                list.appendChild(div);
            });
            showScreen('history-screen');
        }

        function quickLoad(code) {
            document.getElementById('code-input').value = code;
            loadByCode();
        }

        // --- GAMEPLAY ENGINE ---
        function startGame(style) {
            playStyle = style;
            currentIndex = 0;
            scores = { left: 0, right: 0 };
            document.getElementById('score-left').innerText = "0";
            document.getElementById('score-right').innerText = "0";
            
            if(gameMode === 'solo') {
                document.getElementById('team-right').classList.add('hidden');
            } else {
                document.getElementById('team-right').classList.remove('hidden');
            }
            
            showScreen('game-play');
            loadWord();
        }

        function loadWord() {
            if(currentIndex >= currentWords.length) {
                alert(`Game Over! Final Scores - Squirrel: ${scores.left}, Bear: ${scores.right}`);
                showScreen('main-menu');
                return;
            }

            document.getElementById('current-word-index').innerText = `Word: ${currentIndex + 1}/${currentWords.length}`;
            setupZone('left');
            if(gameMode === 'duel') setupZone('right');
            
            speakWord();
        }

        function setupZone(side) {
            const area = document.getElementById(`play-area-${side}`);
            const kb = document.getElementById(`kb-${side}`);
            const word = currentWords[currentIndex].toUpperCase();
            area.innerHTML = '';
            kb.innerHTML = '';

            if(playStyle === 'spellit') {
                // Input slots (static display)
                const display = document.createElement('div');
                display.style.fontSize = '40px';
                display.style.letterSpacing = '10px';
                display.style.borderBottom = '3px solid #333';
                display.style.minWidth = '200px';
                display.style.textAlign = 'center';
                display.id = `display-${side}`;
                display.innerText = '_'.repeat(word.length);
                area.appendChild(display);
                createKeyboard(side);
                area.dataset.current = "";
            } else {
                // Unscramble / Logic Fix
                const slots = document.createElement('div');
                slots.className = 'slots-container';
                const pool = document.createElement('div');
                pool.className = 'letters-pool';

                const chars = word.split('');
                const shuffled = [...chars].sort(() => Math.random() - 0.5);

                chars.forEach((_, i) => {
                    const slot = document.createElement('div');
                    slot.className = 'slot';
                    slot.dataset.index = i;
                    slot.ondrop = drop;
                    slot.ondragover = allowDrop;
                    slot.ontouchend = touchEnd;
                    slots.appendChild(slot);
                });

                shuffled.forEach((char, i) => {
                    const tile = document.createElement('div');
                    tile.className = 'letter-tile';
                    tile.draggable = true;
                    tile.innerText = char;
                    tile.id = `tile-${side}-${i}`;
                    tile.ondragstart = drag;
                    tile.ontouchstart = touchStart;
                    tile.ontouchmove = touchMove;
                    pool.appendChild(tile);
                });

                area.appendChild(slots);
                area.appendChild(pool);
            }
        }

        function createKeyboard(side) {
            const keys = "QWERTYUIOPASDFGHJKLZXCVBNM".split('');
            const container = document.getElementById(`kb-${side}`);
            keys.forEach(k => {
                const btn = document.createElement('button');
                btn.className = 'key';
                btn.innerText = k;
                btn.onclick = () => handleKey(side, k);
                container.appendChild(btn);
            });
            const back = document.createElement('button');
            back.className = 'key key-wide';
            back.innerText = 'Del';
            back.style.background = '#d9534f';
            back.onclick = () => handleKey(side, 'BACK');
            container.appendChild(back);
        }

        function handleKey(side, key) {
            const target = currentWords[currentIndex].toUpperCase();
            const area = document.getElementById(`play-area-${side}`);
            let current = area.dataset.current;

            if(key === 'BACK') {
                current = current.slice(0, -1);
            } else if(current.length < target.length) {
                current += key;
            }

            area.dataset.current = current;
            const display = document.getElementById(`display-${side}`);
            display.innerText = current + '_'.repeat(Math.max(0, target.length - current.length));

            if(current === target) {
                markCorrect(side);
            }
        }

        // --- DRAG AND DROP (Logic Fix) ---
        function drag(ev) {
            ev.dataTransfer.setData("text", ev.target.id);
            draggedElement = ev.target;
        }

        function allowDrop(ev) { ev.preventDefault(); }

        function drop(ev) {
            ev.preventDefault();
            const data = ev.dataTransfer.getData("text");
            const tile = document.getElementById(data);
            handlePlacement(ev.target, tile);
        }

        // Touch Support for Smartboards
        let touchTarget = null;
        function touchStart(e) {
            draggedElement = e.target;
            e.target.style.opacity = "0.5";
        }
        function touchMove(e) {
            e.preventDefault();
            const touch = e.touches[0];
            const element = document.elementFromPoint(touch.clientX, touch.clientY);
            touchTarget = element;
        }
        function touchEnd(e) {
            draggedElement.style.opacity = "1";
            if(touchTarget && (touchTarget.classList.contains('slot') || touchTarget.classList.contains('letters-pool'))) {
                handlePlacement(touchTarget, draggedElement);
            }
        }

        function handlePlacement(target, tile) {
            const side = tile.id.includes('left') ? 'left' : 'right';
            const zone = document.getElementById(`team-${side}`);
            
            // If target is an occupied slot, swap or return
            if(target.classList.contains('letter-tile')) {
                const parent = target.parentNode;
                parent.appendChild(tile);
                // Return original to pool
                zone.querySelector('.letters-pool').appendChild(target);
            } else {
                target.appendChild(tile);
            }

            checkUnscramble(side);
        }

        function checkUnscramble(side) {
            const zone = document.getElementById(`team-${side}`);
            const slots = zone.querySelectorAll('.slot');
            let built = "";
            slots.forEach(s => {
                if(s.firstChild) built += s.firstChild.innerText;
            });

            if(built === currentWords[currentIndex].toUpperCase()) {
                markCorrect(side);
            }
        }

        // --- FEEDBACK & AUDIO ---
        function markCorrect(side) {
            soundCorrect.play();
            scores[side] += 10;
            document.getElementById(`score-${side}`).innerText = scores[side];
            
            // Brief pause before next word
            setTimeout(() => {
                currentIndex++;
                loadWord();
            }, 1000);
        }

        function speakWord() {
            const utterance = new SpeechSynthesisUtterance(currentWords[currentIndex]);
            utterance.lang = 'en-US';
            utterance.rate = 0.8;
            synth.speak(utterance);
        }

        function pickStudent() {
            const max = document.getElementById('class-size').value;
            if(!max) return;
            const num = Math.floor(Math.random() * max) + 1;
            document.getElementById('picked-student').innerText = "#" + num;
        }

        // Initialize with default view
        showScreen('main-menu');
    </script>
</body>
</html>
