<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spelling Bee: Classroom Master</title>
    <style>
        /* 1. VISUAL DESIGN & THEME */
        :root {
            --honey-yellow: #ffecb3;
            --bee-yellow: #ffcc00;
            --soft-white: #ffffff;
            --text-dark: #333333;
        }

        body {
            font-family: "Comic Sans MS", "Comic Sans", cursive;
            background-color: var(--soft-white);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        .screen {
            display: none;
            min-height: 100vh;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .active { display: flex; }

        h1 { font-size: 3rem; color: var(--text-dark); margin-bottom: 10px; }

        /* BUTTONS */
        .btn {
            background-color: var(--bee-yellow);
            border: 3px solid #b89500;
            border-radius: 20px;
            padding: 15px 30px;
            font-size: 1.5rem;
            font-family: "Comic Sans MS", cursive;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.1s ease;
            box-shadow: 0 4px 0 #b89500;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .btn-small { padding: 8px 15px; font-size: 1rem; }

        /* ANIMATED BEE */
        .bee-container { position: relative; width: 100%; height: 100px; }
        .bee {
            font-size: 3rem;
            position: absolute;
            animation: fly 4s infinite ease-in-out;
        }
        @keyframes fly {
            0% { left: 10%; transform: translateY(0) rotate(0); }
            50% { left: 80%; transform: translateY(-20px) rotate(10deg); }
            100% { left: 10%; transform: translateY(0) rotate(0); }
        }

        /* DUEL SPLIT SCREEN */
        .duel-container {
            display: flex;
            width: 100%;
            height: 90vh;
        }
        .team-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 4px dashed var(--bee-yellow);
            padding: 10px;
            position: relative;
        }
        .team-side:first-child { border-right: 2px solid #ccc; }

        /* KEYBOARD */
        .keyboard {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 400px;
            margin-top: 10px;
        }
        .key {
            width: 35px;
            height: 45px;
            margin: 3px;
            background: var(--honey-yellow);
            border: 2px solid var(--bee-yellow);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
        }

        /* DRAG AND DROP */
        .tiles-container, .target-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            min-height: 60px;
            margin: 15px 0;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 10px;
            width: 90%;
            justify-content: center;
        }
        .letter-tile {
            width: 50px;
            height: 50px;
            background: var(--bee-yellow);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: grab;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }

        /* UTILS */
        .modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border: 5px solid var(--bee-yellow);
            padding: 20px;
            z-index: 100;
            border-radius: 20px;
            text-align: center;
            display: none;
        }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; z-index: 99;
        }
        input { font-family: "Comic Sans MS", cursive; padding: 10px; border-radius: 10px; border: 2px solid var(--bee-yellow); margin: 5px; }
        .score-display { font-size: 2rem; font-weight: bold; }
        .back-btn { position: absolute; top: 10px; left: 10px; z-index: 50; }
    </style>
</head>
<body>

    <button class="btn btn-small back-btn" onclick="showScreen('menu-screen')">🏠 Menu</button>

    <div id="menu-screen" class="screen active">
        <div class="bee-container"><div class="bee">🐝</div></div>
        <h1>Spelling Bee</h1>
        <p>Classroom Master</p>
        <button class="btn" onclick="openModeSelect('practice')">🎯 Spelling Practice</button>
        <button class="btn" onclick="openModeSelect('duel')">⚔️ Team Duel</button>
        <button class="btn" onclick="showScreen('edit-screen')">📝 Edit Words</button>
        <button class="btn" onclick="showScreen('code-screen')">🔑 Game Code</button>
        <button class="btn" onclick="showHistory()">📜 Code History</button>
        
        <div style="margin-top:20px; background:#fff8e1; padding:15px; border-radius:15px;">
            <h3>Random Student Picker</h3>
            <input type="number" id="class-size" placeholder="Class Size (e.g. 30)" value="20">
            <button class="btn btn-small" onclick="pickStudent()">Pick Number!</button>
            <div id="picked-number" style="font-size:2rem; font-weight:bold;"></div>
        </div>
    </div>

    <div id="mode-screen" class="screen">
        <h2 id="mode-title">Choose Your Style</h2>
        <button class="btn" onclick="startGame('unscramble')">🧩 Unscramble</button>
        <button class="btn" onclick="startGame('spell')">⌨️ Spell It</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="game-content" style="width:100%; text-align:center;">
            <div class="score-display">Score: <span id="p-score">0</span></div>
            <button class="btn" onclick="speakWord()">🔊 Listen</button>
            <div id="play-area"></div>
            <button class="btn" onclick="checkAnswer()">Submit</button>
        </div>
    </div>

    <div id="duel-screen" class="screen">
        <div class="duel-container">
            <div id="left-side" class="team-side">
                <input type="text" value="Team A" class="team-name" style="font-size:1.5rem; text-align:center;">
                <div class="score-display">Score: <span id="l-score">0</span></div>
                <div class="duel-play-area" id="l-play"></div>
            </div>
            <div id="right-side" class="team-side">
                <input type="text" value="Team B" class="team-name" style="font-size:1.5rem; text-align:center;">
                <div class="score-display">Score: <span id="r-score">0</span></div>
                <div class="duel-play-area" id="r-play"></div>
            </div>
        </div>
        <button class="btn" onclick="speakWord()">🔊 Listen Word</button>
    </div>

    <div id="edit-screen" class="screen">
        <h2>Word List Editor</h2>
        <textarea id="word-input" rows="10" cols="30" placeholder="Enter words, one per line..."></textarea>
        <br>
        <button class="btn" onclick="saveWords()">Save & Get Code</button>
    </div>

    <div id="code-screen" class="screen">
        <h2>Enter 6-Digit Code</h2>
        <input type="text" id="game-code-input" maxlength="6" style="font-size:2rem; text-align:center;">
        <button class="btn" onclick="loadByCode()">Load Words</button>
    </div>

    <div id="history-screen" class="screen">
        <h2>Last 10 Codes</h2>
        <div id="history-list"></div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="modal" id="modal">
        <h2 id="modal-msg"></h2>
        <button class="btn" onclick="closeModal()">Next</button>
    </div>

    <script>
        // --- DATA & INITIALIZATION ---
        let currentWords = ["Alphabet", "Beehive", "Challenge", "Knowledge", "Classroom", "Student", "Teacher", "English", "Simple", "Learning"];
        let gameMode = 'practice'; // practice or duel
        let gameStyle = 'spell'; // unscramble or spell
        let currentWordIndex = 0;
        let pScore = 0, lScore = 0, rScore = 0;
        let codes = JSON.parse(localStorage.getItem('bee_codes') || "[]");

        // --- NAVIGATION ---
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function openModeSelect(mode) {
            gameMode = mode;
            document.getElementById('mode-title').innerText = (mode === 'duel') ? "Team Duel Style" : "Practice Style";
            showScreen('mode-screen');
        }

        // --- SPEECH API ---
        function speakWord() {
            const msg = new SpeechSynthesisUtterance(currentWords[currentWordIndex]);
            msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
        }

        function playSound(type) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            
            if(type === 'correct') {
                osc.frequency.setValueAtTime(523.25, ctx.currentTime); // C5
                osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.3);
            } else {
                osc.frequency.setValueAtTime(150, ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.3);
            }
            
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
            osc.stop(ctx.currentTime + 0.3);
        }

        // --- GAME LOGIC ---
        function startGame(style) {
            gameStyle = style;
            currentWordIndex = 0;
            pScore = 0; lScore = 0; rScore = 0;
            updateScores();
            
            if (gameMode === 'practice') {
                showScreen('game-screen');
                setupRound();
            } else {
                showScreen('duel-screen');
                setupDuelRound();
            }
        }

        function setupRound() {
            const area = document.getElementById('play-area');
            area.innerHTML = '';
            const word = currentWords[currentWordIndex].toUpperCase();

            if (gameStyle === 'unscramble') {
                renderUnscramble(area, word, 'p');
            } else {
                renderKeyboard(area, 'p');
            }
        }

        function setupDuelRound() {
            const lArea = document.getElementById('l-play');
            const rArea = document.getElementById('r-play');
            lArea.innerHTML = ''; rArea.innerHTML = '';
            const word = currentWords[currentWordIndex].toUpperCase();

            if (gameStyle === 'unscramble') {
                renderUnscramble(lArea, word, 'l');
                renderUnscramble(rArea, word, 'r');
            } else {
                renderKeyboard(lArea, 'l');
                renderKeyboard(rArea, 'r');
            }
        }

        // --- UI GENERATORS ---
        function renderKeyboard(container, side) {
            const display = document.createElement('div');
            display.id = side + "-display";
            display.style = "font-size:2.5rem; letter-spacing:5px; height:50px; margin:20px; border-bottom:3px solid var(--bee-yellow)";
            container.appendChild(display);

            const kb = document.createElement('div');
            kb.className = "keyboard";
            "QWERTYUIOPASDFGHJKLZXCVBNM".split('').forEach(key => {
                const k = document.createElement('div');
                k.className = "key";
                k.innerText = key;
                k.onclick = () => {
                    display.innerText += key;
                    checkDuelSpelling(side);
                };
                kb.appendChild(k);
            });
            const del = document.createElement('div');
            del.className = "key"; del.innerText = "⌫";
            del.style.width = "60px";
            del.onclick = () => display.innerText = display.innerText.slice(0, -1);
            kb.appendChild(del);
            container.appendChild(kb);
        }

        function renderUnscramble(container, word, side) {
            const target = document.createElement('div');
            target.className = "target-container";
            target.id = side + "-target";
            
            const tiles = document.createElement('div');
            tiles.className = "tiles-container";
            tiles.id = side + "-tiles";

            // Shuffle letters
            const shuffled = word.split('').sort(() => Math.random() - 0.5);
            shuffled.forEach(l => {
                const tile = document.createElement('div');
                tile.className = "letter-tile";
                tile.innerText = l;
                tile.onclick = () => {
                    if (tile.parentElement === tiles) target.appendChild(tile);
                    else tiles.appendChild(tile);
                    checkDuelSpelling(side);
                };
                tiles.appendChild(tile);
            });

            container.appendChild(target);
            container.appendChild(tiles);
        }

        // --- WIN/LOGIC CHECKING ---
        function checkDuelSpelling(side) {
            let attempt = "";
            const target = currentWords[currentWordIndex].toUpperCase();

            if (gameStyle === 'spell') {
                attempt = document.getElementById(side + '-display').innerText;
            } else {
                attempt = Array.from(document.getElementById(side + '-target').children).map(c => c.innerText).join('');
            }

            if (attempt === target) {
                playSound('correct');
                if (side === 'l') lScore++; else if (side === 'r') rScore++; else pScore++;
                updateScores();
                nextRound();
            }
        }

        function checkAnswer() { // For Practice Submit button
            checkDuelSpelling('p');
        }

        function updateScores() {
            if(document.getElementById('p-score')) document.getElementById('p-score').innerText = pScore;
            if(document.getElementById('l-score')) document.getElementById('l-score').innerText = lScore;
            if(document.getElementById('r-score')) document.getElementById('r-score').innerText = rScore;
        }

        function nextRound() {
            currentWordIndex++;
            if (currentWordIndex >= currentWords.length) {
                showModal("🎉 Lesson Complete!");
                currentWordIndex = 0;
            } else {
                gameMode === 'practice' ? setupRound() : setupDuelRound();
            }
        }

        // --- DATA MANAGEMENT ---
        function saveWords() {
            const val = document.getElementById('word-input').value;
            const list = val.split('\n').map(w => w.trim()).filter(w => w !== "");
            if (list.length === 0) return alert("Enter some words!");
            
            const code = Math.floor(100000 + Math.random() * 900000).toString();
            const data = { code, words: list, date: new Date().toLocaleDateString() };
            
            codes.unshift(data);
            if (codes.length > 10) codes.pop();
            localStorage.setItem('bee_codes', JSON.stringify(codes));
            localStorage.setItem('words_' + code, JSON.stringify(list));
            
            alert("Saved! Your Classroom Code is: " + code);
            currentWords = list;
            showScreen('menu-screen');
        }

        function loadByCode() {
            const code = document.getElementById('game-code-input').value;
            const stored = localStorage.getItem('words_' + code);
            if (stored) {
                currentWords = JSON.parse(stored);
                alert("Loaded " + currentWords.length + " words!");
                showScreen('menu-screen');
            } else {
                alert("Code not found.");
            }
        }

        function showHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            codes.forEach(c => {
                const b = document.createElement('button');
                b.className = "btn btn-small";
                b.innerText = `${c.code} (${c.date})`;
                b.onclick = () => {
                    currentWords = c.words;
                    alert("Loaded " + c.code);
                    showScreen('menu-screen');
                };
                list.appendChild(b);
            });
            showScreen('history-screen');
        }

        // --- UTILS ---
        function pickStudent() {
            const max = document.getElementById('class-size').value;
            const num = Math.floor(Math.random() * max) + 1;
            document.getElementById('picked-number').innerText = "Student #" + num;
        }

        function showModal(msg) {
            document.getElementById('modal-msg').innerText = msg;
            document.getElementById('modal').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
            showScreen('menu-screen');
        }

        // Initialize textarea with default words
        document.getElementById('word-input').value = currentWords.join('\n');
    </script>
</body>
</html>
