<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spelling Bee: Classroom Master</title>
    <style>
        :root {
            --honey-yellow: #fff9c4;
            --bee-yellow: #ffeb3b;
            --bee-black: #333333;
            --soft-white: #ffffff;
            --border-color: #fbc02d;
        }

        body {
            font-family: "Comic Sans MS", "Comic Sans",
            background-color: var(--soft-white);
            color: var(--bee-black);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* MENU BACKGROUND & BEES */
        .menu-bg {
            background-color: #fffde7;
            position: relative;
            overflow: hidden;
        }
        
        .pastel-bee {
            position: absolute; width: 50px; height: 40px; background: var(--bee-yellow);
            border-radius: 50%; border: 2px solid #000; opacity: 0.6; z-index: 0;
            animation: float 6s infinite ease-in-out;
        }
        .pastel-bee::after {
            content: ''; position: absolute; top: 5px; left: 15px;
            width: 10px; height: 30px; border-left: 5px solid #000; border-right: 5px solid #000;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; position: relative; z-index: 1; }
        .active { display: flex; }
        h1 { font-size: 3.5rem; font-weight: bold; text-shadow: 2px 2px 0px #fff; margin: 20px 0; text-align: center; }

        .btn {
            background-color: var(--bee-yellow); border: 4px solid var(--bee-black);
            border-radius: 20px; padding: 15px 40px; font-size: 1.5rem; font-weight: bold;
            font-family: inherit; cursor: pointer; margin: 10px; box-shadow: 0 6px 0 var(--bee-black);
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--bee-black); }
        .btn-small { padding: 8px 15px; font-size: 1rem; border-radius: 12px; }

        /* GAME ELEMENTS */
        .game-picker {
            background: #fff; border: 3px solid var(--bee-black); border-radius: 15px;
            padding: 10px; display: flex; align-items: center; gap: 10px; margin-bottom: 15px;
        }

        .display-area { font-size: 2.5rem; font-weight: bold; height: 60px; margin: 10px; border-bottom: 5px solid var(--bee-black); text-align: center; min-width: 200px; white-space: pre; }

        /* UNSCRAMBLE HORIZONTAL BOXES */
        .unscramble-container { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .target-slots { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin: 20px 0; min-height: 65px; width: 95%; }
        .slot {
            width: 50px; height: 60px; border: 3px dashed #ccc; border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: bold;
            background: rgba(255,255,255,0.5);
        }
        .slot.space-slot { border: none; background: transparent; width: 30px; }
        
        .letter-pool { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; width: 95%; padding: 20px; background: #fdfdfd; border-radius: 20px; border: 2px solid #eee; }
        .tile {
            width: 50px; height: 60px; background: var(--bee-yellow); border: 3px solid var(--bee-black);
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #000;
        }

        /* KEYBOARD */
        .keyboard { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .kb-row { display: flex; justify-content: center; margin-bottom: 5px; width: 100%; }
        .key {
            min-width: 45px; height: 55px; margin: 3px; background: #fff;
            border: 3px solid var(--bee-black); border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.3rem; cursor: pointer; user-select: none;
        }

        .duel-container { display: flex; width: 100vw; height: 80vh; }
        .team-side { flex: 1; display: flex; flex-direction: column; align-items: center; border: 1px solid #ddd; padding: 10px; overflow-y: auto; }
        .back-btn { position: absolute; top: 10px; left: 10px; z-index: 100; }
    </style>
</head>
<body>

    <button class="btn btn-small back-btn" onclick="showScreen('menu-screen')">BACK</button>

    <div id="menu-screen" class="screen active menu-bg">
        <div class="pastel-bee" style="top:5%; left:5%; animation-delay: 0s;"></div>
        <div class="pastel-bee" style="top:15%; right:10%; animation-delay: 1s;"></div>
        <div class="pastel-bee" style="bottom:20%; left:15%; animation-delay: 2s;"></div>
        <div class="pastel-bee" style="top:50%; right:5%; animation-delay: 3s;"></div>
        <div class="pastel-bee" style="bottom:5%; right:20%; animation-delay: 4.5s;"></div>

        <h1>SPELLING BEE<br>CLASSROOM MASTER</h1>
        <button class="btn" onclick="openModeSelect('practice')">PRACTICE</button>
        <button class="btn" onclick="openModeSelect('duel')">TEAM DUEL</button>
        <button class="btn" onclick="showScreen('edit-screen')">EDIT LIST</button>
        <button class="btn" onclick="showScreen('code-screen')">GAME CODE</button>
        <button class="btn" onclick="showHistory()">CODE HISTORY</button>
    </div>

    <div id="mode-screen" class="screen">
        <h2>SELECT STYLE</h2>
        <button class="btn" onclick="startGame('unscramble')">UNSCRAMBLE</button>
        <button class="btn" onclick="startGame('spell')">SPELL IT</button>
    </div>

    <div id="game-screen" class="screen">
        <div class="game-picker">
            <span>Student #</span>
            <input type="number" id="size-p" value="20" style="width:50px;">
            <button class="btn btn-small" onclick="pickStudent('p')">PICK</button>
            <b id="num-p" style="font-size:1.5rem; margin-left:10px;">-</b>
        </div>
        <button class="btn" onclick="speakWord()">LISTEN</button>
        <div id="p-play" style="width:100%;"></div>
    </div>

    <div id="duel-screen" class="screen" style="padding:0;">
        <div class="duel-container">
            <div class="team-side">
                <div class="game-picker">
                    <input type="text" value="TEAM A" style="width:80px; font-weight:bold;">
                    <button class="btn btn-small" onclick="pickStudent('l')">PICK</button>
                    <b id="num-l">-</b>
                </div>
                <div id="l-play"></div>
            </div>
            <div class="team-side">
                <div class="game-picker">
                    <input type="text" value="TEAM B" style="width:80px; font-weight:bold;">
                    <button class="btn btn-small" onclick="pickStudent('r')">PICK</button>
                    <b id="num-r">-</b>
                </div>
                <div id="r-play"></div>
            </div>
        </div>
        <button class="btn" style="position:fixed; bottom:10px;" onclick="speakWord()">LISTEN</button>
    </div>

    <div id="edit-screen" class="screen">
        <h2>EDIT LIST</h2>
        <textarea id="word-input" rows="8" cols="35"></textarea>
        <button class="btn" onclick="saveWords()">SAVE</button>
    </div>

    <div id="code-screen" class="screen">
        <h2>ENTER CODE</h2>
        <input type="text" id="game-code-input" style="font-size:2rem; text-align:center;">
        <button class="btn" onclick="loadByCode()">LOAD</button>
    </div>

    <div id="history-screen" class="screen">
        <h2>HISTORY</h2>
        <div id="history-list" style="display:flex; flex-direction:column;"></div>
    </div>

    <script>
        let currentWords = ["Happy Bee", "English Class", "Great Job"];
        let wordIndex = 0;
        let gameMode = 'practice';
        let gameStyle = 'spell';
        let isCaps = false;
        const qwerty = [["Q","W","E","R","T","Y","U","I","O","P"], ["A","S","D","F","G","H","J","K","L"], ["Z","X","C","V","B","N","M"]];

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function openModeSelect(mode) { gameMode = mode; showScreen('mode-screen'); }

        function pickStudent(side) {
            const input = document.getElementById('size-p'); 
            const max = input ? input.value : 20;
            document.getElementById('num-' + side).innerText = Math.floor(Math.random() * max) + 1;
        }

        function speakWord() {
            const u = new SpeechSynthesisUtterance(currentWords[wordIndex]);
            u.lang = 'en-US'; window.speechSynthesis.speak(u);
        }

        function startGame(style) {
            gameStyle = style; wordIndex = 0;
            if(gameMode === 'practice') { showScreen('game-screen'); renderRound('p-play', 'p'); }
            else { showScreen('duel-screen'); renderRound('l-play', 'l'); renderRound('r-play', 'r'); }
        }

        function renderRound(containerId, side) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            const word = currentWords[wordIndex];

            if(gameStyle === 'spell') {
                const display = document.createElement('div');
                display.id = side + "-display"; display.className = "display-area";
                container.appendChild(display);
                renderKeyboard(container, side);
            } else {
                renderUnscramble(container, side, word);
            }
        }

        function renderUnscramble(container, side, word) {
            const wrapper = document.createElement('div');
            wrapper.className = "unscramble-container";
            
            const targetDiv = document.createElement('div');
            targetDiv.className = "target-slots";
            targetDiv.id = side + "-target";

            // Create horizontal slots
            for(let char of word) {
                const slot = document.createElement('div');
                if(char === " ") {
                    slot.className = "slot space-slot";
                    slot.innerText = " ";
                } else {
                    slot.className = "slot";
                    slot.dataset.expected = char;
                }
                targetDiv.appendChild(slot);
            }

            const poolDiv = document.createElement('div');
            poolDiv.className = "letter-pool";
            
            // Letters only pool
            const letters = word.replace(/\s/g, '').split('').sort(() => Math.random() - 0.5);
            letters.forEach(l => {
                const tile = document.createElement('div');
                tile.className = "tile";
                tile.innerText = l;
                tile.onclick = () => {
                    // Find first empty non-space slot
                    const emptySlots = targetDiv.querySelectorAll('.slot:not(.space-slot)');
                    for(let slot of emptySlots) {
                        if(!slot.innerText) {
                            slot.innerText = l;
                            slot.style.background = "var(--bee-yellow)";
                            slot.style.border = "3px solid black";
                            tile.style.visibility = "hidden";
                            checkUnscrambleWin(side, word);
                            break;
                        }
                    }
                };
                poolDiv.appendChild(tile);
            });

            // Reset button for the round
            const resetBtn = document.createElement('button');
            resetBtn.className = "btn btn-small";
            resetBtn.innerText = "RESET TILES";
            resetBtn.onclick = () => renderRound(container.id, side);

            wrapper.appendChild(targetDiv);
            wrapper.appendChild(poolDiv);
            wrapper.appendChild(resetBtn);
            container.appendChild(wrapper);
        }

        function checkUnscrambleWin(side, word) {
            const slots = document.getElementById(side + "-target").querySelectorAll('.slot');
            let attempt = "";
            slots.forEach(s => attempt += s.innerText || "");
            
            if(attempt === word) {
                wordIndex++;
                if(wordIndex >= currentWords.length) { 
                    alert("PHRASES COMPLETE!"); 
                    showScreen('menu-screen'); 
                } else {
                    if(gameMode === 'practice') renderRound('p-play', 'p');
                    else { renderRound('l-play', 'l'); renderRound('r-play', 'r'); }
                }
            }
        }

        function renderKeyboard(container, side) {
            const kb = document.createElement('div'); kb.className = "keyboard";
            qwerty.forEach(row => {
                const rowDiv = document.createElement('div'); rowDiv.className = "kb-row";
                row.forEach(l => {
                    const k = document.createElement('div'); k.className = "key";
                    k.innerText = isCaps ? l : l.toLowerCase();
                    k.onclick = () => handleInput(side, k.innerText);
                    rowDiv.appendChild(k);
                });
                kb.appendChild(rowDiv);
            });
            const row4 = document.createElement('div'); row4.className = "kb-row";
            const caps = document.createElement('div'); caps.className = "key"; caps.innerText = "CAPS"; caps.onclick = () => { isCaps = !isCaps; renderRound(container.id, side); };
            const space = document.createElement('div'); space.className = "key"; space.innerText = "SPACE"; space.style.width="120px"; space.onclick = () => handleInput(side, " ");
            const del = document.createElement('div'); del.className = "key"; del.innerText = "DEL"; del.onclick = () => {
                const d = document.getElementById(side + "-display"); d.innerText = d.innerText.slice(0, -1);
            };
            row4.appendChild(caps); row4.appendChild(space); row4.appendChild(del);
            kb.appendChild(row4); container.appendChild(kb);
        }

        function handleInput(side, char) {
            const display = document.getElementById(side + "-display");
            display.innerText += char;
            if(display.innerText === currentWords[wordIndex]) {
                wordIndex++;
                if(wordIndex >= currentWords.length) { alert("DONE!"); showScreen('menu-screen'); }
                else renderRound(side === 'p' ? 'p-play' : side + '-play', side);
            }
        }

        function saveWords() {
            const list = document.getElementById('word-input').value.split('\n').filter(x => x.trim());
            if(list.length) {
                const code = Math.floor(100000 + Math.random() * 900000);
                localStorage.setItem('words_' + code, JSON.stringify(list));
                let history = JSON.parse(localStorage.getItem('history') || "[]");
                history.unshift(code);
                localStorage.setItem('history', JSON.stringify(history.slice(0, 10)));
                currentWords = list;
                alert("CODE: " + code);
                showScreen('menu-screen');
            }
        }

        function showHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            const history = JSON.parse(localStorage.getItem('history') || "[]");
            history.forEach(code => {
                const b = document.createElement('button');
                b.className = "btn"; b.innerText = code;
                b.onclick = () => {
                    currentWords = JSON.parse(localStorage.getItem('words_' + code));
                    showScreen('menu-screen');
                };
                list.appendChild(b);
            });
            showScreen('history-screen');
        }

        function loadByCode() {
            const c = document.getElementById('game-code-input').value;
            const d = localStorage.getItem('words_' + c);
            if(d) { currentWords = JSON.parse(d); showScreen('menu-screen'); }
        }

        document.getElementById('word-input').value = currentWords.join('\n');
    </script>
</body>
</html>
